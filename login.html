<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Packs4Life</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="shell">
  <div class="topbar glass">
    <a class="brand" href="/index.html" style="text-decoration:none;">
      <div class="brand-mark"></div>
      <div class="brand-name">Packs<span>4</span>Life</div>
    </a>
  </div>

  <main class="main" style="max-width:380px;margin:0 auto;padding-top:80px;">
    <span class="eyebrow"><span class="blip"></span> Welcome back</span>
    <h1 style="font-family:var(--font-display);font-weight:800;font-size:30px;margin-top:16px;letter-spacing:-.02em;">Sign in</h1>
    <p style="color:var(--muted);margin-top:8px;">Sign in to upload packs and manage your profile.</p>

    <form class="panel" id="login-form" style="margin-top:24px;">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="submit-btn">Sign in</button>
      <div class="form-msg" id="form-msg"></div>
    </form>

    <p style="text-align:center;margin-top:18px;color:var(--muted);font-size:13px;">
      No account? <a href="/signup.html" style="color:var(--green-soft);font-weight:700;">Sign up</a>
    </p>
    <a href="/index.html" style="display:block;text-align:center;margin-top:14px;color:var(--muted);font-size:12.5px;">← back to the hub</a>
  </main>

  <footer class="foot">
    <span>Packs4Life — community texture pack hub</span>
    <span class="mono">hosted on cloudflare pages</span>
  </footer>
</div>

<script>
const returnTo = new URLSearchParams(location.search).get("return_to") || "/profile.html";

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submit-btn");
  const msg = document.getElementById("form-msg");
  btn.disabled = true;
  btn.textContent = "Signing in…";

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not sign in.");
    location.href = returnTo;
  } catch (err) {
    msg.textContent = err.message;
    msg.className = "form-msg show err";
    btn.disabled = false;
    btn.textContent = "Sign in";
  }
});
</script>
</body>
</html>
