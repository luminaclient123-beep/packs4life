<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload a Pack — Packs4Life</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="shell">

  <div class="topbar glass">
    <a class="brand" href="/index.html" style="text-decoration:none;">
      <div class="brand-name">Packs<span>4</span>Life</div>
    </a>
    <div class="tabs">
      <a class="tab" href="/index.html">Home</a>
      <a class="tab" href="/packs.html">Browse Packs</a>
      <a class="tab active" href="/upload.html">Upload</a>
    </div>
    <div id="nav-account" class="status-pill">…</div>
  </div>

  <main class="main" style="max-width:600px;padding-top:50px;">
    <span class="eyebrow"><span class="blip"></span> Share it with everyone</span>
    <h1 style="font-family:var(--font-display);font-weight:800;font-size:clamp(28px,4.5vw,38px);margin-top:16px;letter-spacing:-.02em;">Upload a texture pack</h1>

    <form class="panel" id="upload-form" style="margin-top:26px;">
      <div class="field">
        <label for="name">Pack name</label>
        <input type="text" id="name" required maxlength="60" placeholder="e.g. Faithful 32x">
      </div>

      <div class="field">
        <label>Minecraft version</label>
        <div id="version"></div>
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" required maxlength="400" placeholder="What does this pack change? Resolution, theme, what it's built for…"></textarea>
      </div>

      <div class="field">
        <label>Categories</label>
        <div id="cat-picker"></div>
      </div>

      <div class="field">
        <label for="thumbnail">Pack thumbnail (optional)</label>
        <div class="image-well">
          <div class="preview" id="thumb-preview">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="color:var(--muted-dim)"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div>
            <button type="button" class="btn btn-ghost" id="thumb-btn">Choose image</button>
            <input type="file" id="thumbnail" accept="image/*" style="display:none;">
            <p style="color:var(--muted-dim);font-size:11.5px;margin-top:8px;">Shown on the pack's card and page.</p>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="youtube">YouTube showcase (optional)</label>
        <input type="text" id="youtube" placeholder="https://youtube.com/watch?v=…">
        <div class="yt-preview" id="yt-preview"><div class="yt-preview-inner" id="yt-preview-inner"></div></div>
      </div>

      <div class="field">
        <label>Pack file (.zip)</label>
        <div class="dropzone" id="dropzone">
          <div id="dz-default">
            <p><strong style="color:var(--white)">Click to choose a file</strong> or drag one here</p>
            <p>.zip only, up to 18MB</p>
          </div>
          <div class="zip-name" id="zip-name" style="display:none;"></div>
        </div>
        <input type="file" id="file" accept=".zip" style="display:none;">
      </div>

      <div class="progress-track" id="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" id="submit-btn">Upload to the hub</button>
      <div class="form-msg" id="form-msg"></div>
    </form>
  </main>

  <footer class="foot">
    <span>Packs4Life — community texture pack hub</span>
    <span class="mono">hosted on cloudflare pages</span>
  </footer>
</div>

<script src="/assets/app.js"></script>
<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");
const zipName = document.getElementById("zip-name");
const dzDefault = document.getElementById("dz-default");
let chosenFile = null;
let chosenThumbDataUrl = null;

// Version dropdown (custom glass widget — native <select> popups
// ignore CSS and render as plain white OS lists)
const versionDropdown = createGlassDropdown(document.getElementById("version"), MC_VERSIONS, { placeholder: "Choose a version…" });

// Category picker (custom pill toggles)
const catPicker = createPillToggleGroup(document.getElementById("cat-picker"), CATEGORIES);

(async function gate() {
  const res = await fetch("/api/auth/me");
  const data = await res.json();
  const currentUser = data.user;

  const nav = document.getElementById("nav-account");
  nav.innerHTML = currentUser
    ? `<a href="/profile.html" style="color:var(--text);font-weight:700;">${escapeHTML(currentUser.name)}</a>`
    : `<a href="/login.html?return_to=/upload.html" style="color:var(--text);font-weight:700;">Sign in</a>`;

  if (!currentUser) {
    document.getElementById("upload-form").innerHTML = `
      <div class="empty-state">
        <h3>Sign in to upload</h3>
        <p>You need a Packs4Life account to share a pack with everyone.</p>
        <a class="btn btn-primary" href="/login.html?return_to=/upload.html" style="margin-top:14px;display:inline-flex;">Sign in</a>
      </div>`;
  }
})();

// Thumbnail picker
const thumbBtn = document.getElementById("thumb-btn");
const thumbInput = document.getElementById("thumbnail");
const thumbPreview = document.getElementById("thumb-preview");
thumbBtn.addEventListener("click", () => thumbInput.click());
thumbInput.addEventListener("change", async () => {
  const f = thumbInput.files[0];
  if (!f) return;
  try {
    chosenThumbDataUrl = await fileToResizedDataURL(f, 480, 0.85);
    thumbPreview.innerHTML = `<img src="${chosenThumbDataUrl}" style="width:100%;height:100%;object-fit:cover;">`;
  } catch (e) {
    showMsg(e.message, "err");
  }
});

// YouTube preview
const ytInput = document.getElementById("youtube");
const ytPreview = document.getElementById("yt-preview");
const ytPreviewInner = document.getElementById("yt-preview-inner");
function extractYoutubeId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes("youtu.be")) return u.pathname.slice(1) || null;
    if (u.hostname.includes("youtube.com")) {
      if (u.searchParams.get("v")) return u.searchParams.get("v");
      const m = u.pathname.match(/\/(embed|shorts)\/([^/?]+)/);
      if (m) return m[2];
    }
  } catch { return null; }
  return null;
}
ytInput.addEventListener("input", () => {
  const id = extractYoutubeId(ytInput.value.trim());
  if (id) {
    ytPreviewInner.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}" frameborder="0" allowfullscreen loading="lazy"></iframe>`;
    ytPreview.classList.add("show");
  } else {
    ytPreview.classList.remove("show");
    ytPreviewInner.innerHTML = "";
  }
});

dropzone.addEventListener("click", () => fileInput.click());
["dragover", "dragenter"].forEach(ev => dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.add("drag"); }));
["dragleave", "drop"].forEach(ev => dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.remove("drag"); }));
dropzone.addEventListener("drop", (e) => { const f = e.dataTransfer.files[0]; if (f) setFile(f); });
fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(f) {
  if (!f.name.toLowerCase().endsWith(".zip")) { showMsg("Only .zip files are accepted.", "err"); return; }
  if (f.size > 18 * 1024 * 1024) { showMsg("File is over the 18MB limit.", "err"); return; }
  chosenFile = f;
  dzDefault.style.display = "none";
  zipName.style.display = "block";
  zipName.textContent = `${f.name} — ${fmtBytes(f.size)}`;
}

function showMsg(text, kind) {
  const el = document.getElementById("form-msg");
  el.textContent = text;
  el.className = `form-msg show ${kind}`;
}

async function dataUrlToFile(dataUrl, filename) {
  const res = await fetch(dataUrl);
  const blob = await res.blob();
  return new File([blob], filename, { type: blob.type });
}

document.getElementById("upload-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!chosenFile) { showMsg("Choose a .zip file first.", "err"); return; }

  const btn = document.getElementById("submit-btn");
  const track = document.getElementById("progress-track");
  const fill = document.getElementById("progress-fill");
  btn.disabled = true;
  btn.textContent = "Uploading…";
  track.classList.add("show");

  if (!versionDropdown.value) { showMsg("Choose a Minecraft version.", "err"); return; }

  const fd = new FormData();
  fd.append("name", document.getElementById("name").value.trim());
  fd.append("version", versionDropdown.value);
  fd.append("description", document.getElementById("description").value.trim());
  fd.append("categories", catPicker.value.join(","));
  fd.append("youtube", ytInput.value.trim());
  fd.append("file", chosenFile);
  if (chosenThumbDataUrl) {
    fd.append("thumbnail", await dataUrlToFile(chosenThumbDataUrl, "thumb.jpg"));
  }

  try {
    const result = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/api/upload");
      xhr.upload.onprogress = (ev) => { if (ev.lengthComputable) fill.style.width = `${Math.round((ev.loaded / ev.total) * 100)}%`; };
      xhr.onload = () => { if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText)); else reject(new Error((JSON.parse(xhr.responseText || "{}").error) || "Upload failed")); };
      xhr.onerror = () => reject(new Error("Network error during upload"));
      xhr.send(fd);
    });

    showMsg("Uploaded! Redirecting to your pack…", "ok");
    setTimeout(() => { location.href = `/pack.html?id=${encodeURIComponent(result.id)}`; }, 900);
  } catch (err) {
    showMsg(err.message || "Something went wrong. Try again.", "err");
    btn.disabled = false;
    btn.textContent = "Upload to the hub";
  }
});
</script>
</body>
</html>
