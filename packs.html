<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Packs — Packs4Life</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="shell">

  <div class="topbar glass">
    <a class="brand" href="/index.html" style="text-decoration:none;">
      <div class="brand-name">Packs<span>4</span>Life</div>
    </a>
    <div class="tabs">
      <a class="tab" href="/index.html">Home</a>
      <a class="tab active" href="/packs.html">Browse Packs</a>
      <a class="tab" href="/upload.html">Upload</a>
    </div>
    <div id="nav-account" class="status-pill">…</div>
  </div>

  <main class="main" style="padding-top:50px;">
    <span class="eyebrow"><span class="blip"></span> <span id="count-label">Loading…</span></span>
    <h1 style="font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4.5vw,44px);margin-top:16px;letter-spacing:-.02em;">All texture packs</h1>
    <p style="color:var(--muted);margin-top:8px;max-width:520px;">Everything the community has uploaded, newest first. Click a pack for the full description and download.</p>

    <div class="filter-bar" style="margin-top:28px;">
      <input type="search" id="search" placeholder="Search packs by name or tag…">
      <button class="chip active" data-sort="new">Newest</button>
      <button class="chip" data-sort="downloads">Most downloaded</button>
      <button class="chip" data-sort="az">A–Z</button>
    </div>

    <div class="browse-layout" style="margin-top:24px;">
      <aside class="filter-sidebar glass">
        <div>
          <span class="filter-group-label">Version</span>
          <div id="version-filter"></div>
        </div>

        <div>
          <span class="filter-group-label">Categories</span>
          <div id="category-filters"></div>
        </div>

        <button class="filter-clear" id="clear-filters">Clear filters</button>
      </aside>

      <div class="grid" id="all-grid">
        <div class="empty-state" style="grid-column:1/-1">Loading packs…</div>
      </div>
    </div>
  </main>

  <footer class="foot">
    <span>Packs4Life — community texture pack hub</span>
    <span class="mono">hosted on cloudflare pages</span>
  </footer>
</div>

<script src="/assets/app.js"></script>
<script>
let allPacks = [];
let sortMode = "new";

// Version dropdown (custom glass widget)
const versionDropdown = createGlassDropdown(document.getElementById("version-filter"), ["All versions", ...MC_VERSIONS], { value: "All versions" });
versionDropdown.onChange(render);

// Category pill toggles
const categoryToggles = createPillToggleGroup(document.getElementById("category-filters"), CATEGORIES);
categoryToggles.onChange(render);

document.getElementById("clear-filters").addEventListener("click", () => {
  categoryToggles.clear();
  versionDropdown.value = "All versions";
  render();
});

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const activeVersion = versionDropdown.value === "All versions" ? "" : versionDropdown.value;
  const activeCategories = categoryToggles.value;
  let list = allPacks.filter(p => {
    const matchesQ = !q || p.name.toLowerCase().includes(q) || (p.description || "").toLowerCase().includes(q);
    const matchesVersion = !activeVersion || p.version === activeVersion;
    const matchesCats = activeCategories.length === 0 ||
      (p.categories || []).some(c => activeCategories.includes(c));
    return matchesQ && matchesVersion && matchesCats;
  });

  if (sortMode === "new") list.sort((a, b) => new Date(b.uploaded) - new Date(a.uploaded));
  if (sortMode === "downloads") list.sort((a, b) => (b.downloads || 0) - (a.downloads || 0));
  if (sortMode === "az") list.sort((a, b) => a.name.localeCompare(b.name));

  document.getElementById("count-label").textContent = `${allPacks.length} pack${allPacks.length === 1 ? "" : "s"} on the hub`;

  const grid = document.getElementById("all-grid");
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Nothing matches</h3><p>Try different filters, or <a href="/upload.html" style="color:var(--green-soft)">upload the first one</a>.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(packCardHTML).join("");
}

document.getElementById("search").addEventListener("input", render);
document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    sortMode = chip.dataset.sort;
    render();
  });
});

renderNavAccount();

(async function () {
  const presetQ = new URLSearchParams(location.search).get("q");
  if (presetQ) document.getElementById("search").value = presetQ;
  try {
    allPacks = await fetchPacks();
    render();
  } catch (e) {
    document.getElementById("all-grid").innerHTML = `<div class="empty-state" style="grid-column:1/-1">Couldn't reach the hub. Try refreshing.</div>`;
  }
})();
</script>
</body>
</html>
