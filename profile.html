<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Packs4Life</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-name">Packs4Life</div>
        <div class="brand-sub">Minecraft texture packs</div>
      </div>
    </div>
    <div class="nav-label">Navigate</div>
    <a class="nav-item" href="/index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-7 9 7M5 10v10h14V10"/></svg>
      Home
    </a>
    <a class="nav-item" href="/packs.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8L12 3 3 8l9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/></svg>
      Browse Packs
    </a>
    <a class="nav-item" href="/upload.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M6 10l6-6 6 6"/><path d="M4 20h16"/></svg>
      Upload a Pack
    </a>
  </aside>

  <div>
    <div class="topbar">
      <div class="tabs">
        <a class="tab" href="/index.html">Home</a>
        <a class="tab" href="/packs.html">Packs</a>
        <a class="tab" href="/upload.html">Upload</a>
      </div>
      <div id="nav-account" class="status-pill">…</div>
    </div>

    <main class="main" style="max-width:640px;" id="profile-main">
      <div class="empty-state">Loading profile…</div>
    </main>
  </div>
</div>

<script src="/assets/app.js"></script>
<script>
initAccountMenu("nav-account");

async function getMe() {
  const res = await fetch("/api/auth/me");
  const data = await res.json();
  return data.user;
}

function ownProfileHTML(me) {
  return `
    <div style="display:flex;align-items:center;gap:16px;">
      <div style="position:relative;">
        ${me.avatar ? `<img id="avatar-preview" src="${me.avatar}" width="64" height="64" style="border-radius:50%;object-fit:cover;">` : `<div id="avatar-preview">${pixelIconHTML(me.id, 14)}</div>`}
        <button id="avatar-btn" style="position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);color:#fff;font-size:12px;cursor:pointer;">✎</button>
        <input type="file" id="avatar-input" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;">
      </div>
      <div>
        <h1 style="font-size:26px;">${escapeHTML(me.name)}</h1>
        <div style="color:var(--muted);font-size:12.5px;">${escapeHTML(me.email || "")}</div>
      </div>
    </div>
    <div class="form-msg" id="avatar-msg"></div>

    <div class="panel" style="margin-top:24px;">
      <div class="field">
        <label for="name">Display name</label>
        <input type="text" id="name" value="${escapeHTML(me.name)}" maxlength="40">
      </div>
      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" maxlength="300" placeholder="Tell people what you make...">${escapeHTML(me.bio || "")}</textarea>
      </div>
      <button class="btn btn-primary" id="save-btn">Save changes</button>
      <div class="form-msg" id="save-msg"></div>
    </div>

    <div class="section-head">
      <span class="kicker">Your packs</span>
      <span class="rule"></span>
    </div>
    <div class="grid" id="my-packs"><div class="empty-state" style="grid-column:1/-1">Loading…</div></div>
  `;
}

function publicProfileHTML(user, packs) {
  return `
    <div style="display:flex;align-items:center;gap:16px;">
      ${user.avatar ? `<img src="${user.avatar}" width="64" height="64" style="border-radius:50%;object-fit:cover;">` : pixelIconHTML(user.id, 14)}
      <div>
        <h1 style="font-size:26px;">${escapeHTML(user.name)}</h1>
        <div style="color:var(--muted);font-size:12.5px;">member since ${new Date(user.joined).toLocaleDateString()}</div>
      </div>
    </div>
    ${user.bio ? `<p style="color:var(--muted);margin-top:14px;max-width:520px;">${escapeHTML(user.bio)}</p>` : ""}

    <div class="section-head">
      <span class="kicker">Packs by ${escapeHTML(user.name)}</span>
      <span class="rule"></span>
    </div>
    <div class="grid">
      ${packs.length ? packs.map(packCardHTML).join("") : `<div class="empty-state" style="grid-column:1/-1">No packs uploaded yet.</div>`}
    </div>
  `;
}

(async function () {
  const main = document.getElementById("profile-main");
  const viewId = new URLSearchParams(location.search).get("id");
  const me = await getMe();

  if (viewId && (!me || viewId !== me.id)) {
    // viewing someone else's public profile
    try {
      const res = await fetch(`/api/profile/${encodeURIComponent(viewId)}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      main.innerHTML = publicProfileHTML(data.user, data.packs);
    } catch {
      main.innerHTML = `<div class="empty-state"><h3>Profile not found</h3></div>`;
    }
    return;
  }

  if (!me) {
    main.innerHTML = `<div class="empty-state">
      <h3>You're not signed in</h3>
      <p>Sign in to view or edit your profile.</p>
      <a class="btn btn-primary" href="/login.html" style="margin-top:14px;display:inline-flex;">Sign in</a>
    </div>`;
    return;
  }

  main.innerHTML = ownProfileHTML(me);

  document.getElementById("avatar-btn").addEventListener("click", () => {
    document.getElementById("avatar-input").click();
  });

  document.getElementById("avatar-input").addEventListener("change", async () => {
    const file = document.getElementById("avatar-input").files[0];
    if (!file) return;
    const msg = document.getElementById("avatar-msg");
    const fd = new FormData();
    fd.append("avatar", file);
    try {
      const res = await fetch("/api/profile-avatar", { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Could not update avatar.");
      const preview = document.getElementById("avatar-preview");
      preview.outerHTML = `<img id="avatar-preview" src="${data.user.avatar}" width="64" height="64" style="border-radius:50%;object-fit:cover;">`;
      msg.textContent = "";
      msg.className = "form-msg";
    } catch (e) {
      msg.textContent = e.message;
      msg.className = "form-msg show err";
    }
  });

  document.getElementById("save-btn").addEventListener("click", async () => {
    const name = document.getElementById("name").value.trim();
    const bio = document.getElementById("bio").value.trim();
    const msg = document.getElementById("save-msg");
    try {
      const res = await fetch("/api/profile-update", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ name, bio }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Could not save.");
      msg.textContent = "Saved.";
      msg.className = "form-msg show ok";
    } catch (e) {
      msg.textContent = e.message;
      msg.className = "form-msg show err";
    }
  });

  try {
    const packs = await fetchPacks();
    const mine = packs.filter((p) => p.authorId === me.id);
    const grid = document.getElementById("my-packs");
    grid.innerHTML = mine.length
      ? mine.map(packCardHTML).join("")
      : `<div class="empty-state" style="grid-column:1/-1">You haven't uploaded anything yet.</div>`;
  } catch {}
})();
</script>
</body>
</html>
