<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack — Packs4Life</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div class="topbar glass">
  <div class="topbar-left">
    <div class="topbar-mark"></div>
    <div class="topbar-name">Packs<span>4</span>Life</div>
  </div>
  <nav class="topbar-nav">
    <a class="topbar-link" href="/index.html">Home</a>
    <a class="topbar-link active" href="/packs.html">Browse Packs</a>
    <a class="topbar-link" href="/upload.html">Upload</a>
  </nav>
  <div class="topbar-right">
    <div class="status-pill"><span class="blip"></span> hub online</div>
  </div>
</div>

<main class="page" id="detail" style="max-width:640px;padding-top:50px;">
  <div class="empty-state">Loading pack…</div>
</main>

<footer class="foot">
  <span>Packs4Life — community texture pack hub</span>
  <span class="mono">hosted on cloudflare pages</span>
</footer>

<script src="/assets/app.js"></script>
<script>
(async function () {
  const id = new URLSearchParams(location.search).get("id");
  const el = document.getElementById("detail");
  if (!id) { el.innerHTML = `<div class="empty-state"><h3>No pack specified</h3></div>`; return; }

  try {
    const packs = await fetchPacks();
    const p = packs.find(x => x.id === id);
    if (!p) { el.innerHTML = `<div class="empty-state"><h3>Pack not found</h3><p>It may have been removed.</p></div>`; return; }

    el.innerHTML = `
      <a href="/packs.html" class="mono" style="color:var(--muted);font-size:12.5px;">← back to all packs</a>
      <div style="display:flex;align-items:center;gap:16px;margin-top:16px;">
        ${pixelIconHTML(p.id).replace('grid-template-columns: repeat(4,5px)', 'grid-template-columns: repeat(4,10px)').replace('grid-template-rows: repeat(4,5px)', 'grid-template-rows: repeat(4,10px)')}
        <span class="tag">${escapeHTML(p.version || "v1")}</span>
      </div>
      <h1 style="font-family:var(--font-display);font-weight:800;font-size:clamp(28px,4.5vw,38px);margin-top:16px;letter-spacing:-.02em;">${escapeHTML(p.name)}</h1>
      <p style="color:var(--muted);margin-top:10px;max-width:560px;line-height:1.6;">${escapeHTML(p.description || "No description provided.")}</p>

      <div class="panel" style="margin-top:26px;">
        <div class="card-meta" style="border:none;padding:0;margin:0;gap:20px;font-size:12.5px;">
          <span>⬇ ${p.downloads || 0} downloads</span>
          <span>${fmtBytes(p.size)}</span>
          <span>uploaded ${timeAgo(p.uploaded)}</span>
          <span>by ${escapeHTML(p.author || "anonymous")}</span>
        </div>
        <a class="btn btn-primary btn-block" style="margin-top:18px;" href="/api/download/${encodeURIComponent(p.id)}">
          ⬇ Download .zip
        </a>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><h3>Couldn't load this pack</h3></div>`;
  }
})();
</script>
</body>
</html>
